name: Test Image

on:
  push:
    branches: [ test-cache ]

jobs:
  test:
    name: ${{matrix.runs-on}}
    strategy:
      fail-fast: false
      matrix:
        # runs-on: [ubuntu-latest, ubicloud-standard-2-ubuntu-2004, ubicloud-standard-2-ubuntu-2204, ubicloud-standard-2-ubuntu-2404]
        runs-on: [ubicloud-standard-2-ubuntu-2204, ubicloud]
    runs-on: ${{matrix.runs-on}}

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Generate folders and files to cache
        run: |
          mkdir myfolder
          dd if=/dev/urandom of=myfolder/file1.txt bs=1M count=10
          mkdir myfolder2
          dd if=/dev/urandom of=myfolder2/file1.txt bs=1M count=15

      - name: Save folders and files
        uses: actions/cache/restore@v4
        with:
          path: |
            myfolder
            myfolder2
          key: cached_folders-2

      - name: Setup Ruby with cache
        id: setup-ruby
        uses: ubicloud/setup-ruby@master
        env:
          BUNDLE_GEMFILE: ./ruby/Gemfile
        with:
          ruby-version: '3.2.6'
          bundler-cache: true
