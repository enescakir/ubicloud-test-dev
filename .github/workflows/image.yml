name: Test ubicloud image

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: ${{matrix.runs-on}}
    runs-on: ${{matrix.runs-on}}
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          - ubicloud-standard-2-ubuntu-2204
          # - ubicloud-standard-2-ubuntu-2404
          # - ubicloud-standard-2-ubuntu-2404
          # - ubicloud-standard-2-arm-ubuntu-2204
          # - ubicloud-standard-2-arm-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ubicloud/ssh-runner@v1
        with:
          public-ssh-key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMsY2oTeeKCK8pr339MREPlai6bvnlnCX3pvCCBKoJ7c enes@cakir.web.tr"
          wait-minutes: 120
      # Metadata checks
      - run: systemd-analyze
      - run: systemd-analyze blame
      - run: systemd-analyze critical-chain network-online.target
      - run: systemd-analyze critical-chain sshd.service
      - run: cloud-init analyze blame
      - run: cloud-init analyze show 
