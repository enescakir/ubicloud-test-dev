name: Test ubicloud image

on:
  push:
    branches: [ enes/setup-clover ]

jobs:
  test:
    name: ${{matrix.runs-on}}
    runs-on: ${{matrix.runs-on}}
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          - ubicloud-standard-30-ubuntu-2204
          - ubicloud-standard-30-ubuntu-2404
          - ubicloud-standard-30-arm-ubuntu-2204
          - ubicloud-standard-30-arm-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: ubicloud/ssh-runner@v2
        with:
          public-ssh-key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMsY2oTeeKCK8pr339MREPlai6bvnlnCX3pvCCBKoJ7c enes@cakir.web.tr"
          wait-minutes: 0
      # Metadata checks
      - run: uname -mr
      - run: nproc
      - run: cat /proc/cpuinfo
      - run: lsb_release -a
      - run: echo $PATH
      - run: printenv
      - run: df -Th

      - run: |
          echo "Stopping PostgreSQL cluster if it exists..."
          sudo -u postgres pg_dropcluster 16 main --stop || true
          echo "Adding PostgreSQL APT repository..."
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          echo "Updating package lists..."
          sudo apt-get update
          echo "Installing PostgreSQL 17..."
          sudo apt-get install -y postgresql-17 postgresql-client-17
          echo "Configuring PostgreSQL to allow password authentication..."
          echo 'runner_map runner postgres
          runner_map runner clover
          runner_map runner clover_password' | sudo tee -a /etc/postgresql/17/main/pg_ident.conf > /dev/null
          echo "allow local connections"
          sudo sed -i '1i local   all   all   peer map=runner_map' /etc/postgresql/17/main/pg_hba.conf
          echo "starting PostgreSQL service..."
          sudo systemctl start postgresql
          echo "Waiting for PostgreSQL to be ready..."
          until pg_isready -q; do sleep 1; done
